<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

  <style>
    #ctaBtn {
      display:none;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {transform:scale(1);}
      50% {transform:scale(1.05);}
      100% {transform:scale(1);}
    }
  </style>
</head>

<body onload="startPage()">

<div class="screen">

  <!-- Hook -->
  <h2 id="hook">⏳ Limited users hi access kar pa rahe</h2>

  <!-- Sub -->
  <p id="sub">
    Har kisi ko access nahi mil raha… abhi try karo warna miss ho jayega ❌
  </p>

  <!-- Warning -->
  <p style="color:#ff4d4d;">
    ⚠️ System kabhi bhi band ho sakta hai
  </p>

  <!-- Live activity -->
  <p style="color:red;" id="live">
    👀 3,102 log already inside hain
  </p>

  <!-- Timer -->
  <p>
    ⏳ Access closing in <span id="timer">02:30</span>
  </p>

  <!-- CTA -->
  <button id="ctaBtn" onclick="goStep1('lp7')">
    🔓 Unlock Access Now
  </button>

</div>

<script src="script.js"></script>

<script>
function startPage(){

  track('visit','lp7');

  // 🔥 Dynamic hooks
  const hooks = [
    "⏳ Limited users hi access kar pa rahe",
    "⚠️ Sirf kuch logon ko hi entry mil rahi",
    "🚫 Access restricted for most users"
  ];

  document.getElementById("hook").innerText =
    hooks[Math.floor(Math.random()*hooks.length)];

  // 👀 Live counter
  setInterval(()=>{
    let n = Math.floor(Math.random()*4000)+1500;
    document.getElementById("live").innerText =
    "👀 " + n + " log already inside hain";
  },2000);

  // ⏳ Timer
  let time = 150;
  setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("timer").innerText =
    m + ":" + (s<10?"0":"") + s;
    if(time > 0) time--;
  },1000);

  // ⏳ Delay CTA
  setTimeout(()=>{
    document.getElementById("ctaBtn").style.display="block";
  },2000);
}
</script>

</body>
</html>
