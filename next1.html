<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

  <style>
    #nextBtn{
      display:none;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.05);}
      100%{transform:scale(1);}
    }
  </style>
</head>

<body onload="startPage()" style="text-align:center; padding:20px;">

<h2>🔐 Step 1: Algorithm Secret</h2>

<p id="text">
  Instagram sabko same reach nahi deta ❌  
  ye ek hidden signal pe depend karta hai 😳
</p>

<p style="color:#00ffcc;">
  🔥 Agar ye signal strong ho gaya → reels push ho jati hai 🚀
</p>

<p style="color:red;" id="live">
  👀 2,134 log ye step dekh rahe hain
</p>

<button id="nextBtn" onclick="goStep2()">
  👉 Continue to Step 2
</button>

<script src="script.js"></script>

<script>
function startPage(){

  if(typeof track === "function"){
    track('visit','next1');
  }

  // 👀 Live counter
  setInterval(()=>{
    let n = Math.floor(Math.random()*3000)+1000;
    document.getElementById("live").innerText =
      "👀 " + n + " log ye step dekh rahe hain";
  },2000);

  // ⏳ Delay button (engagement)
  setTimeout(()=>{
    document.getElementById("nextBtn").style.display="block";
  },2000);

  // 🔥 Auto push (backup)
  setTimeout(()=>{
    window.location.href = "next2.html";
  },12000);
}
</script>

</body>
</html>
